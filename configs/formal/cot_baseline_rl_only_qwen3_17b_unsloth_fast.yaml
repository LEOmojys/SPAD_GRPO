# Unsloth fast/stable RL-only CoT-GRPO baseline for Qwen3-1.7B.
# Run: .\.conda_unsloth\python.exe grpo_spad_unsloth.py --config configs/formal/cot_baseline_rl_only_qwen3_17b_unsloth_fast.yaml --mode baseline

model:
  name: "./Models/qwen3_1_7b"
  max_seq_length: 1024
  max_completion_length: 512
  dtype: "bfloat16"
  load_in_4bit: true
  temperature: 0.7
  top_p: 0.9

lora:
  r: 4
  alpha: 8
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  dropout: 0
  bias: "none"

data:
  sft_file: "dataset/gsm8k/train.jsonl"
  rl_file: "dataset/gsm8k/train.jsonl"
  eval_file: "dataset/gsm8k/test.jsonl"
  max_samples: 0
  sft_samples: 0
  rl_samples: 7473
  eval_samples: 1319

training:
  sft_learning_rate: 2.0e-4
  sft_steps: 0
  sft_batch_size: 2
  grpo_learning_rate: 3.0e-6
  lr_scheduler_type: "cosine"
  warmup_steps: 24
  grpo_steps: 300
  num_generations: 8
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2
  steps_per_generation: 1
  epsilon_clip: 0.2
  beta_kl: 0.03
  weight_decay: 0.01
  seed: 42

spad:
  answer_reward: 1.0
  wrong_reward: -0.5
  format_reward: 0.05
  consistency_reward_weight: 0.0
  repetition_penalty_weight: 0.0
  length_penalty_weight: 0.0
  process_tau: 1.0
  consistency_weight: 0.0
  virtual_reward: 1.0
  zero_advantage_fix: false

logging:
  output_dir: "./results/formal/cot_baseline_rl_only_qwen3_17b_unsloth_fast"
  logging_steps: 2
  save_steps: 20
  eval_episodes: 1319
  run_name: "formal_cot_grpo_baseline_rl_only_qwen3_17b_unsloth_fast"
