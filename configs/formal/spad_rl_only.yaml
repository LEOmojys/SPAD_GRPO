# Formal RL-only SPAD-GRPO.
# Run: python grpo_spad_trl.py --config configs/formal/spad_rl_only.yaml --mode spad

model:
  name: "./Models/qwen3_5_2b"
  max_seq_length: 1024
  max_completion_length: 1024
  dtype: "bfloat16"
  load_in_4bit: true
  temperature: 0.7
  top_p: 0.9

lora:
  r: 8
  alpha: 16
  target_modules: ["in_proj_qkv", "out_proj", "q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  dropout: 0.05
  bias: "none"

data:
  sft_file: "dataset/gsm8k/train.jsonl"
  rl_file: "dataset/gsm8k/train.jsonl"
  eval_file: "dataset/gsm8k/test.jsonl"
  max_samples: 0
  sft_samples: 0
  rl_samples: 7473
  eval_samples: 1319

training:
  sft_learning_rate: 2.0e-4
  sft_steps: 0
  sft_batch_size: 2
  grpo_learning_rate: 3.0e-6
  lr_scheduler_type: "cosine"
  warmup_steps: 36
  grpo_steps: 300
  num_generations: 4
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  steps_per_generation: 1
  epsilon_clip: 0.2
  beta_kl: 0.005
  weight_decay: 0.01
  seed: 42

spad:
  answer_reward: 2.0
  wrong_reward: -1.0
  format_reward: 0.03
  consistency_reward_weight: 0.0
  repetition_penalty_weight: 0.0
  length_penalty_weight: 0.0
  process_tau: 0.9
  positive_score_threshold: 0.9
  negative_score_threshold: 0.9
  min_step_weight: 0.2
  consistency_weight: 0.0
  virtual_reward: 1.0
  zero_advantage_fix: true
  positive_length_tiebreak: false
  normalize_token_advantage: true
  max_token_advantage_scale: 5.0

logging:
  output_dir: "./results/formal/spad_rl_only"
  logging_steps: 10
  save_steps: 50
  eval_episodes: 50
  run_name: "formal_spad_grpo_rl_only"
